name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: go test + vet + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.21'
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "files needing gofmt:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: go build
        run: go build ./...

  shell:
    name: install.sh shellcheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck install.sh
        run: shellcheck -s sh install.sh
      - name: shellcheck tests/install_test.sh
        run: shellcheck -s sh tests/install_test.sh
      - name: shellcheck examples/*.sh
        # examples carry bash shebangs; let shellcheck honor them (no -s sh).
        run: shellcheck examples/*.sh
      - name: run install_test.sh
        run: sh tests/install_test.sh
