<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160" role="img" aria-label="Before: tangled machinery of pokes, watches, caches. After: one simple inbox with a Markdown file. The story of 0.8 — we built it, then deleted most of it.">
  <rect width="600" height="160" fill="#FAF9F5"/>
  <!-- Before: tangled -->
  <text x="150" y="25" font-family="ui-monospace, monospace" font-size="12" fill="#17180F" text-anchor="middle">Before: overbuilt</text>
  <g stroke="#C8791A" stroke-width="1.5" fill="none">
    <path d="M60 50 Q90 70 70 90"/>
    <path d="M90 50 Q120 75 95 100"/>
    <path d="M110 55 Q75 80 105 95"/>
    <circle cx="70" cy="65" r="6" fill="#EAF1ED" stroke="#C8791A"/>
    <circle cx="100" cy="80" r="6" fill="#EAF1ED" stroke="#C8791A"/>
    <circle cx="85" cy="95" r="6" fill="#EAF1ED" stroke="#C8791A"/>
    <rect x="55" y="45" width="50" height="10" rx="2" fill="#F0F1EA" stroke="#C8791A"/>
  </g>
  <text x="150" y="125" font-family="ui-monospace, monospace" font-size="9" fill="#8A8C7C" text-anchor="middle">watchdog + reachability + pokes</text>

  <!-- Arrow + deleted -->
  <path d="M200 80 L250 80" stroke="#1E6F57" stroke-width="2" marker-end="url(#ah)"/>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#1E6F57"/>
    </marker>
  </defs>
  <text x="225" y="70" font-family="ui-monospace, monospace" font-size="10" fill="#1E6F57" text-anchor="middle">deleted</text>

  <!-- After: simple -->
  <text x="450" y="25" font-family="ui-monospace, monospace" font-size="12" fill="#17180F" text-anchor="middle">After: simple</text>
  <rect x="400" y="45" width="100" height="60" rx="6" fill="#FFFFFF" stroke="#1E6F57" stroke-width="2"/>
  <text x="450" y="65" font-family="ui-monospace, monospace" font-size="11" fill="#17180F" text-anchor="middle">inbox/</text>
  <rect x="415" y="75" width="70" height="8" rx="2" fill="#EAF1ED"/>
  <rect x="415" y="88" width="70" height="8" rx="2" fill="#EAF1ED"/>
  <text x="450" y="120" font-family="ui-monospace, monospace" font-size="9" fill="#8A8C7C" text-anchor="middle">one dir + Markdown files</text>
</svg>
