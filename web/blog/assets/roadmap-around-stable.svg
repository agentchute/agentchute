<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="ui-monospace,'JetBrains Mono',SFMono-Regular,Menlo,monospace" role="img" aria-label="A stable Protocol v2 core with four workstreams orbiting outside it: conformance certification, the cue-channel ladder, git-backed pools, and hub-and-spoke. Nothing crosses back into the wire.">
  <defs>
    <pattern id="dots3" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#17180F" opacity="0.045"/>
    </pattern>
    <filter id="card3" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.2" flood-color="#17180F" flood-opacity="0.10"/>
    </filter>
    <marker id="ah3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1E6F57"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="919" height="479" rx="18" fill="#FAF9F5" stroke="#E9E7DD"/>
  <rect x="0.5" y="0.5" width="919" height="479" rx="18" fill="url(#dots3)"/>

  <!-- orbit -->
  <circle cx="460" cy="240" r="158" fill="none" stroke="#E2E0D6" stroke-width="1.4" stroke-dasharray="4 8"/>

  <!-- outward arrows core -> cards -->
  <g stroke="#1E6F57" stroke-width="1.5" stroke-dasharray="2 5" fill="none" opacity="0.8">
    <line x1="460" y1="176" x2="460" y2="126" marker-end="url(#ah3)"/>
    <line x1="562" y1="240" x2="626" y2="240" marker-end="url(#ah3)"/>
    <line x1="460" y1="304" x2="460" y2="354" marker-end="url(#ah3)"/>
    <line x1="358" y1="240" x2="294" y2="240" marker-end="url(#ah3)"/>
  </g>

  <!-- frozen core -->
  <g transform="translate(460,240)" filter="url(#card3)">
    <rect x="-102" y="-64" width="204" height="128" rx="16" fill="#EAF1ED" stroke="#1E6F57" stroke-width="2"/>
    <text x="0" y="-24" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="19" font-weight="700" fill="#17180F" letter-spacing="-0.01em">PROTOCOL v2</text>
    <text x="0" y="0" text-anchor="middle" font-size="10.5" fill="#5C5E50">5 primitives · 7 invariants</text>
    <text x="0" y="18" text-anchor="middle" font-size="10.5" fill="#5C5E50">an inbox · a Markdown file · pull</text>
    <text x="0" y="42" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1E6F57" letter-spacing="0.22em">· STABLE ·</text>
  </g>

  <!-- N: certification -->
  <g transform="translate(370,56)" filter="url(#card3)">
    <rect width="180" height="68" rx="11" fill="#FFFFFF" stroke="#E2E0D6"/>
    <circle cx="26" cy="34" r="12" fill="none" stroke="#1E6F57" stroke-width="1.8"/>
    <path d="M20,34 l4.5,4.5 L33,29" fill="none" stroke="#1E6F57" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="48" y="30" font-size="12.5" font-weight="600" fill="#17180F">certification</text>
    <text x="48" y="47" font-size="10" fill="#8A8C7C" font-family="'Inter',sans-serif">prove your implementation</text>
  </g>

  <!-- E: cue channel -->
  <g transform="translate(630,206)" filter="url(#card3)">
    <rect width="196" height="68" rx="11" fill="#FFFFFF" stroke="#E2E0D6"/>
    <g stroke="#1E6F57" stroke-width="2" stroke-linecap="round">
      <line x1="16" y1="44" x2="28" y2="44"/>
      <line x1="22" y1="34" x2="34" y2="34"/>
      <line x1="28" y1="24" x2="40" y2="24"/>
    </g>
    <text x="52" y="30" font-size="12.5" font-weight="600" fill="#17180F">cue channel</text>
    <text x="52" y="47" font-size="10" fill="#8A8C7C" font-family="'Inter',sans-serif">hooks → MCP → PTY floor</text>
  </g>

  <!-- S: git-backed pools -->
  <g transform="translate(366,356)" filter="url(#card3)">
    <rect width="188" height="68" rx="11" fill="#FFFFFF" stroke="#E2E0D6"/>
    <g stroke="#1E6F57" stroke-width="1.8" fill="#FFFFFF">
      <circle cx="20" cy="24" r="4.5"/>
      <circle cx="20" cy="46" r="4.5"/>
      <circle cx="36" cy="35" r="4.5"/>
      <path d="M20,28.5 v13 M22.5,26 C 30,28 33,30 34.5,31.5" fill="none"/>
    </g>
    <text x="50" y="30" font-size="12.5" font-weight="600" fill="#17180F">git-backed pools</text>
    <text x="50" y="47" font-size="10" fill="#8A8C7C" font-family="'Inter',sans-serif">multi-host, zero new infra</text>
  </g>

  <!-- W: hub-and-spoke -->
  <g transform="translate(96,206)" filter="url(#card3)">
    <rect width="196" height="68" rx="11" fill="#FFFFFF" stroke="#E2E0D6"/>
    <g fill="#1E6F57">
      <circle cx="28" cy="34" r="4"/>
      <circle cx="14" cy="24" r="2.6" opacity="0.55"/>
      <circle cx="14" cy="44" r="2.6" opacity="0.55"/>
      <circle cx="42" cy="24" r="2.6" opacity="0.55"/>
      <circle cx="42" cy="44" r="2.6" opacity="0.55"/>
    </g>
    <text x="54" y="30" font-size="12.5" font-weight="600" fill="#17180F">hub-and-spoke</text>
    <text x="54" y="47" font-size="10" fill="#8A8C7C" font-family="'Inter',sans-serif">pools compose; docs profile</text>
  </g>

  <!-- footnotes -->
  <text x="46" y="452" font-size="10.5" fill="#8A8C7C">nothing crosses back into the wire</text>
  <text x="874" y="452" text-anchor="end" font-size="10.5" fill="#B6B8A8">recorded, not committed — no dates</text>
</svg>
