# ~/.tmux.conf — minimal config for agentchute pools.
#
# No plugins, no theme, no surprises. The five settings below change only
# what helps you run agent panes side-by-side:
#
#   - mouse on        (click panes, drag-resize borders, scroll wheel)
#   - default-terminal (256 colors for any modern terminal)
#   - history-limit   (don't lose agent output on a single tool burst)
#   - friendlier splits (| and - instead of " and %)
#   - reload binding  (prefix + r reloads this file in place)
#
# Copy to ~/.tmux.conf, then restart tmux. Once the reload binding is
# active, future edits can be picked up with `prefix + r` (Ctrl-b r).
#
# This is the agentchute starter kit. If you have an existing tmux config,
# keep yours — the settings here are common enough that you probably have
# most of them already.

set -g mouse on
set -g default-terminal "screen-256color"
set -g history-limit 10000

bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

bind r source-file ~/.tmux.conf \; display-message "reloaded ~/.tmux.conf"
